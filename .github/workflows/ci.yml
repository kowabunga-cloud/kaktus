name: Continuous Integration

on:
  push:
    branches: master
    paths:
      - 'cmd/kaktus/**'
      - 'internal/kaktus/**'
  pull_request:
    branches: master
  workflow_dispatch:

jobs:
  ci:
    uses: kowabunga-cloud/workflows/.github/workflows/go-ci.yml@master
    secrets: inherit
    with:
      pkgs: "librados-dev librbd-dev gcc"
